name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.action != 'closed'
    permissions:
      contents: read
      deployments: write  # needed for Cloudflare Pages deployment status
      pull-requests: write # needed for PR preview URL comments

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js via mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name=hierynomus-speaking-site --branch=${{ github.ref == 'refs/heads/main' && 'main' || github.head_ref }}

  cleanup-previews:
    name: Delete preview deployments
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions:
      contents: read

    steps:
      - name: Delete Cloudflare Pages preview deployments for branch
        run: |
          BRANCH="${{ github.head_ref }}"
          DEPLOYMENTS=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/hierynomus-speaking-site/deployments" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}")

          echo "$DEPLOYMENTS" | jq -r \
            ".result[] | select(.deployment_trigger.metadata.branch == \"$BRANCH\") | .id" \
          | while read -r ID; do
            echo "Deleting preview deployment $ID for branch $BRANCH"
            curl -s -X DELETE \
              "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/hierynomus-speaking-site/deployments/$ID?force=true" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"
          done

  cleanup-production:
    name: Keep last 5 production deployments
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [deploy]
    permissions:
      contents: read

    steps:
      - name: Delete old production deployments
        run: |
          DEPLOYMENTS=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/hierynomus-speaking-site/deployments" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}")

          echo "$DEPLOYMENTS" | jq -r \
            '[.result[] | select(.deployment_trigger.metadata.branch == "main")] | sort_by(.created_on) | reverse | .[5:] | .[].id' \
          | while read -r ID; do
            echo "Deleting old production deployment $ID"
            curl -s -X DELETE \
              "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/hierynomus-speaking-site/deployments/$ID?force=true" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"
          done
