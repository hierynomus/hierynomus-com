<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="c">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>
  <g clip-path="url(#c)">
    <!-- Pine background -->
    <rect width="32" height="32" fill="#0c322c"/>
    <!-- Mint mic capsule -->
    <rect x="9" y="2" width="14" height="19" rx="7" fill="#90ebcd"/>
    <!-- J in Inter / system sans-serif 800 -->
    <text
      x="16" y="15"
      font-family="Inter, 'Inter Variable', system-ui, -apple-system, sans-serif"
      font-weight="800"
      font-size="14"
      fill="#0c322c"
      text-anchor="middle"
      dominant-baseline="auto"
    >J</text>
    <!-- Stand arc -->
    <path d="M8,21 Q8,27 16,27 Q24,27 24,21"
          fill="none" stroke="#90ebcd" stroke-width="2" stroke-linecap="round"/>
    <!-- Rod -->
    <line x1="16" y1="27" x2="16" y2="30"
          stroke="#90ebcd" stroke-width="2" stroke-linecap="round"/>
    <!-- Base -->
    <line x1="9" y1="30" x2="23" y2="30"
          stroke="#90ebcd" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
