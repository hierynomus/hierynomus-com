  <!-- Highlighted hexagons -->
  <polygon points="860,133 900,156 900,203 860,226 820,203 820,156" fill="#30ba78" opacity="0.18" stroke="#30ba78" stroke-width="1.5"/>
  <polygon points="940,226 980,249 980,296 940,319 900,296 900,249" fill="#30ba78" opacity="0.12" stroke="#30ba78" stroke-width="1.5"/>
  <polygon points="1020,133 1060,156 1060,203 1020,226 980,203 980,156" fill="#90ebcd" opacity="0.08" stroke="#90ebcd" stroke-width="1"/>

  <!-- Central glow -->
  <ellipse cx="920" cy="315" rx="280" ry="220" fill="url(#glow)"/>

  <!-- Shield icon (security theme) -->
  <g transform="translate(870, 210)" opacity="0.22">
    <path d="M50 0 L95 20 L95 55 C95 80 74 100 50 110 C26 100 5 80 5 55 L5 20 Z" fill="none" stroke="#90ebcd" stroke-width="3"/>
    <path d="M50 0 L95 20 L95 55 C95 80 74 100 50 110 C26 100 5 80 5 55 L5 20 Z" fill="#90ebcd" opacity="0.1"/>
    <path d="M30 55 L44 70 L72 42" fill="none" stroke="#90ebcd" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Connecting lines between nodes -->
  <g opacity="0.15" stroke="#90ebcd" stroke-width="1">
    <line x1="860" y1="180" x2="940" y2="270"/>
    <line x1="940" y1="270" x2="1020" y2="180"/>
    <line x1="1020" y1="180" x2="1100" y2="270"/>
    <line x1="940" y1="270" x2="940" y2="390"/>
  </g>
  <!-- Node dots -->
  <g fill="#90ebcd" opacity="0.4">
    <circle cx="860" cy="180" r="5"/>
    <circle cx="940" cy="270" r="7"/>
    <circle cx="1020" cy="180" r="5"/>
    <circle cx="1100" cy="270" r="4"/>
    <circle cx="940" cy="390" r="4"/>
  </g>

  <!-- Light ray from top-right -->
  <linearGradient id="ray" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#2453ff" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#2453ff" stop-opacity="0"/>
  </linearGradient>
  <polygon points="1200,0 1200,300 900,0" fill="url(#ray)"/>
