    <polygon points="980,40 1020,63 1020,110 980,133 940,110 940,63"/>
    <polygon points="1060,40 1100,63 1100,110 1060,133 1020,110 1020,63"/>
    <polygon points="1140,40 1180,63 1180,110 1140,133 1100,110 1100,63"/>
    <!-- Row 2 -->
    <polygon points="700,133 740,156 740,203 700,226 660,203 660,156"/>
    <polygon points="780,133 820,156 820,203 780,226 740,203 740,156"/>
    <polygon points="860,133 900,156 900,203 860,226 820,203 820,156"/>
    <polygon points="940,133 980,156 980,203 940,226 900,203 900,156"/>
    <polygon points="1020,133 1060,156 1060,203 1020,226 980,203 980,156"/>
    <polygon points="1100,133 1140,156 1140,203 1100,226 1060,203 1060,156"/>
    <!-- Row 3 -->
    <polygon points="660,226 700,249 700,296 660,319 620,296 620,249"/>
    <polygon points="740,226 780,249 780,296 740,319 700,296 700,249"/>
    <polygon points="820,226 860,249 860,296 820,319 780,296 780,249"/>
    <polygon points="900,226 940,249 940,296 900,319 860,296 860,249"/>
    <polygon points="980,226 1020,249 1020,296 980,319 940,296 940,249"/>
    <polygon points="1060,226 1100,249 1100,296 1060,319 1020,296 1020,249"/>
    <polygon points="1140,226 1180,249 1180,296 1140,319 1100,296 1100,249"/>
    <!-- Row 4 -->
    <polygon points="700,319 740,342 740,389 700,412 660,389 660,342"/>
    <polygon points="780,319 820,342 820,389 780,412 740,389 740,342"/>
    <polygon points="860,319 900,342 900,389 860,412 820,389 820,342"/>
    <polygon points="940,319 980,342 980,389 940,412 900,389 900,342"/>
    <polygon points="1020,319 1060,342 1060,389 1020,412 980,389 980,342"/>
    <polygon points="1100,319 1140,342 1140,389 1100,412 1060,389 1060,342"/>
    <!-- Row 5 -->
    <polygon points="660,412 700,435 700,482 660,505 620,482 620,435"/>
    <polygon points="740,412 780,435 780,482 740,505 700,482 700,435"/>
    <polygon points="820,412 860,435 860,482 820,505 780,482 780,435"/>
    <polygon points="900,412 940,435 940,482 900,505 860,482 860,435"/>
    <polygon points="980,412 1020,435 1020,482 980,505 940,482 940,435"/>
    <polygon points="1060,412 1100,435 1100,482 1060,505 1020,482 1020,435"/>
